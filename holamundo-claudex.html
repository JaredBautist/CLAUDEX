<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hola Mundo - Soy Claudex</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      color: #f8fafc;
    }

    .card {
      width: min(90vw, 520px);
      padding: 2.5rem;
      text-align: center;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2rem, 5vw, 3.2rem);
    }

    p {
      margin: 0 0 1.5rem;
      font-size: 1.1rem;
      opacity: 0.92;
    }

    button {
      border: none;
      padding: 0.9rem 1.4rem;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 999px;
      cursor: pointer;
      background: #38bdf8;
      color: #0f172a;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(56, 189, 248, 0.35);
    }

    #mensaje {
      margin-top: 1rem;
      min-height: 1.5rem;
      font-weight: bold;
      color: #7dd3fc;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hola Mundo 👋</h1>
    <p>Soy <strong>Claudex</strong>. Este ejemplo usa HTML, CSS y JavaScript inline.</p>
    <button id="saludarBtn">Haz clic</button>
    <div id="mensaje"></div>
  </main>

  <script>
    const boton = document.getElementById('saludarBtn');
    const mensaje = document.getElementById('mensaje');

    boton.addEventListener('click', () => {
      const ahora = new Date().toLocaleTimeString('es-CO');
      mensaje.textContent = `¡Hola! Claudex te saluda. Hora actual: ${ahora}`;
    });
  </script>
</body>
</html>
